{{- /* Secret（密码 / API Key 占位） */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pawmatch.fullname" . }}-secret
  labels:
    {{- include "pawmatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 默认值仅用于本地试用；生产必须用 sealed-secrets 或 External Secrets 注入
  db-password: {{ .Values.datasource.password | default "postgres" | quote }}
  redis-password: {{ .Values.redis.password | default "" | quote }}
  rabbitmq-password: {{ .Values.rabbitmq.password | default "guest" | quote }}
  openai-api-key: {{ .Values.ai.openai.apiKey | default "REPLACE_ME" | quote }}
  dashscope-api-key: {{ .Values.ai.dashscope.apiKey | default "REPLACE_ME" | quote }}